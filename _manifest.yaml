version: "0.1.0"
package: vidau-creative-skills
description: VidAU Creative Agent Skill package

layers:
  L0-foundation:
    description: Shared foundation — required by all verticals
  L1-capability:
    description: Production capability workflows
  L2-vertical:
    description: Vertical scenarios — presets + orchestration

skills:
  - id: creative-job-runner
    layer: L0-foundation
    path: L0-foundation/creative-job-runner
    title: Creative Job Runner
    tags: [foundation, async, tracking]
    requires: []
    mcp_tools:
      - creative_get_job
      - creative_list_jobs
      - creative_cancel_job
      - creative_estimate

  - id: creative-platform
    layer: L0-foundation
    path: L0-foundation/creative-platform
    title: VidAU Platform Gateway
    tags: [foundation, platform, upload]
    requires: []
    mcp_tools: []

  - id: creative-narrative-router
    layer: L0-foundation
    path: L0-foundation/creative-narrative-router
    title: Narrative Structure Router
    tags: [foundation, narrative, script, routing, storyboard]
    requires: []
    mcp_tools: []

  - id: creative-seedance2-prompt
    layer: L0-foundation
    path: L0-foundation/creative-seedance2-prompt
    title: Seedance 2.0 Video Prompt Engineering
    tags: [foundation, prompt, seedance, video, jimeng]
    requires: []
    mcp_tools: []

  - id: creative-gpt-image2-prompt
    layer: L0-foundation
    path: L0-foundation/creative-gpt-image2-prompt
    title: GPT Image 2 Prompt Engineering
    tags: [foundation, prompt, gpt-image-2, image, openai]
    requires: []
    mcp_tools: []

  - id: creative-direct
    layer: L1-capability
    path: L1-capability/creative-direct
    title: Direct Image / Video Generation
    tags: [image, video, sync, one-click]
    requires: [creative-platform, creative-job-runner, creative-seedance2-prompt, creative-gpt-image2-prompt]
    mcp_tools:
      - creative_generate_image
      - creative_generate_video
      - creative_image_to_video
      - creative_first_frame_to_video
      - creative_generate_bgm
      - creative_mux_bgm_into_video
      - creative_estimate

  - id: creative-script2film
    layer: L1-capability
    path: L1-capability/creative-script2film
    title: Script to Video (Reference Mode)
    tags: [storyboard, async, script2film, reference, bgm, one-click, long-video, script]
    requires: [creative-job-runner, creative-platform, creative-narrative-router, creative-seedance2-prompt]
    mcp_tools:
      - creative_generate_script
      - creative_submit_script2film
      - creative_generate_bgm
      - creative_mux_bgm_into_video
      - creative_get_job

  - id: creative-script2film-keyframes
    layer: L1-capability
    path: L1-capability/creative-script2film-keyframes
    title: Script to Video (First/Last Frame)
    tags: [storyboard, async, script2film, keyframes, first-frame, one-click]
    requires: [creative-job-runner, creative-platform, creative-narrative-router, creative-seedance2-prompt]
    mcp_tools:
      - creative_submit_script2film_keyframes
      - creative_first_frame_to_video
      - creative_generate_bgm
      - creative_mux_bgm_into_video
      - creative_get_job

  - id: creative-batch-orchestrator
    layer: L1-capability
    path: L1-capability/creative-batch-orchestrator
    title: Batch Orchestrator
    tags: [batch, orchestrator, multi-skill, video, async]
    requires:
      [
        creative-job-runner,
        creative-platform,
        creative-seedance2-prompt,
        creative-gpt-image2-prompt,
        creative-direct,
        creative-script2film,
        creative-script2film-keyframes,
      ]
    mcp_tools:
      - creative_estimate
      - creative_submit_script2film
      - creative_submit_script2film_keyframes
      - creative_submit_batch_variants
      - creative_submit_workflow
      - creative_get_job
      - creative_list_jobs
      - creative_cancel_job

  - id: jianying-remix
    layer: L1-capability
    path: L1-capability/jianying-remix
    title: Jianying / CapCut Local Remix
    tags: [jianying, capcut, remix, transition, local, draft, bgm, batch]
    requires: []
    mcp_tools:
      - creative_generate_bgm

  - id: trend-viral-short
    layer: L2-vertical
    path: L2-vertical/trend-viral-short
    title: Trend Viral Short
    tags: [trend, batch, ecommerce]
    requires: [creative-job-runner, creative-platform, creative-seedance2-prompt, creative-gpt-image2-prompt, creative-script2film, creative-script2film-keyframes, creative-direct]
    preset: trend_viral_v1
    mcp_tools:
      - creative_submit_batch_variants
      - creative_submit_script2film
      - creative_submit_script2film_keyframes
      - creative_generate_video
      - creative_first_frame_to_video
      - creative_get_job

  - id: product-url-to-video
    layer: L2-vertical
    path: L2-vertical/product-url-to-video
    title: Product URL to Video
    tags: [ecommerce, product, url, scrape, script2film, bgm, one-click]
    requires: [creative-job-runner, creative-platform, creative-seedance2-prompt, creative-gpt-image2-prompt, creative-script2film, creative-script2film-keyframes]
    mcp_tools:
      - creative_submit_script2film
      - creative_submit_script2film_keyframes
      - creative_submit_batch_variants
      - creative_generate_image
      - creative_image_to_video
      - creative_first_frame_to_video
      - creative_generate_bgm
      - creative_mux_bgm_into_video
      - creative_get_job
      - creative_estimate

  - id: handheld-product-avatar
    layer: L2-vertical
    path: L2-vertical/handheld-product-avatar
    title: Handheld Product Talking Avatar
    tags: [ecommerce, avatar, handheld, voiceover, ugc, lipsync]
    requires:
      [
        creative-platform,
        creative-job-runner,
        creative-seedance2-prompt,
        creative-gpt-image2-prompt,
        creative-narrative-router,
        creative-direct,
        creative-batch-orchestrator,
      ]
    mcp_tools:
      - creative_generate_tts
      - creative_generate_script
      - creative_generate_image
      - creative_image_to_video
      - creative_submit_workflow
      - creative_estimate
      - creative_get_job
      - creative_list_jobs

  - id: product-image-to-jianying-remix
    layer: L2-vertical
    path: L2-vertical/product-image-to-jianying-remix
    title: Product Image → Scene Clips → Jianying Remix
    tags: [ecommerce, product, image, batch, video, jianying, remix, end-to-end]
    requires:
      [
        creative-platform,
        creative-job-runner,
        creative-seedance2-prompt,
        creative-batch-orchestrator,
        jianying-remix,
      ]
    mcp_tools:
      - creative_get_upload_instructions
      - creative_upload_reference
      - creative_estimate
      - creative_submit_workflow
      - creative_get_job
      - creative_list_jobs
      - creative_cancel_job
      - creative_generate_bgm
